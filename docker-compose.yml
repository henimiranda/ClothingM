version: '3.8'

services:
  traefik:
    image: traefik:v2.10
    container_name: erp_traefik
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8080}:80"
      - "${TRAEFIK_DASHBOARD_PORT:-8082}:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./traefik/traefik.yml:/etc/traefik/traefik.yml:ro"
      - "./traefik/dynamic:/etc/traefik/dynamic:ro"
    depends_on:
      - backend
      - backend-laravel
      - frontend

  minio:
    image: minio/minio
    container_name: erp_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio.rule=PathPrefix(`/storage`)"
      - "traefik.http.routers.minio.entrypoints=web"
      - "traefik.http.routers.minio.middlewares=minio-stripprefix"
      - "traefik.http.middlewares.minio-stripprefix.stripprefix.prefixes=/storage"
      - "traefik.http.services.minio.loadbalancer.server.port=9000"

  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    env_file: .env
    entrypoint: >
      /bin/sh -c " until (/usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}) do echo '...waiting...' && sleep 1; done; /usr/bin/mc mb myminio/erp-files; /usr/bin/mc mb myminio/crm-files; /usr/bin/mc mb myminio/hr-files; /usr/bin/mc policy set public myminio/erp-files; exit 0; "

  backend:
    build: ./backend
    container_name: clothingm_backend
    ports:
      - "5000:5000"
    env_file: ./backend/.env
    depends_on:
      - minio
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=PathPrefix(`/node-api`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.routers.backend.priority=5"
      - "traefik.http.services.backend.loadbalancer.server.port=5000"

  backend-laravel:
    build: ./backend-laravel
    container_name: clothingm_backend_laravel
    ports:
      - "5001:8000"
    env_file: ./backend-laravel/.env
    depends_on:
      - minio
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend-laravel.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.backend-laravel.entrypoints=web"
      - "traefik.http.routers.backend-laravel.priority=20"
      - "traefik.http.services.backend-laravel.loadbalancer.server.port=8000"

  frontend:
    build: ./frontend
    container_name: clothingm_frontend
    ports:
      - "3000:3000"
    env_file: ./frontend/.env.local
    depends_on:
      - backend
      - backend-laravel
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

volumes:
  minio_data:
