version: '3.8'

services:
  gateway:
    image: nginx:alpine
    container_name: erp_gateway
    ports:
      - "${GATEWAY_PORT:-8080}:80"
    volumes:
      - ./services/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - crm
      - hr

  crm:
    build: ./services/crm
    container_name: erp_crm
    env_file: .env
    volumes:
      - ./services/crm:/app
    depends_on:
      - minio

  hr:
    build: ./services/hr
    container_name: erp_hr
    env_file: .env
    volumes:
      - ./services/hr:/app
    depends_on:
      - minio

  minio:
    image: minio/minio
    container_name: erp_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    env_file: .env
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}) do echo '...waiting...' && sleep 1; done;
      /usr/bin/mc mb myminio/erp-files;
      /usr/bin/mc mb myminio/crm-files;
      /usr/bin/mc mb myminio/hr-files;
      /usr/bin/mc policy set public myminio/erp-files;
      exit 0;
      "



volumes:
  minio_data:
